version: '3.8'

services:
  cloud-auditor:
    build:
      context: .
      dockerfile: Dockerfile
    image: cloud-auditor:latest
    volumes:
      # Mount configuration folder
      - ./config:/app/config
      # Mount reports output folder
      - ./reports:/app/reports
      # Mount host AWS credentials for local scanner authentication
      - ~/.aws:/root/.aws:ro
    environment:
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_DEFAULT_REGION
      - GCP_PROJECT_ID
      - GOOGLE_APPLICATION_CREDENTIALS
      - LOG_LEVEL=INFO
    command: ["scan", "--provider", "aws"]
